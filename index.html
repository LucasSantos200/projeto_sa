<!DOCTYPE html>
<html lang="pt-BR">

    <title>Adivinhe A Palavra</title>
</head>
<body>
    <h1>Adivinhe a Palavra</h1>
    <main>

                <span>_</span> <span>_</span> <span>_</span> <span>_</span> <span>_</span>

        <section class="controles">
            <br></br>
            <button id="botao" type="submit">chutar</button>

            <button id="botao-reinicio">reiniciar</button>
        </section>

        <div class="informacoes">
            <p>Tentativas faltantes: <span id="tentativas">6</span></p>
            <p>Pontuação: <span id="pontuacao">0</span></p>

        </div>
    </main>
</body>
